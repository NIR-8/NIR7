<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>VAULT — OneKey Secure</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ══ DESIGN TOKENS ══ */
:root{
  --bg:#07070f;
  --glass:rgba(10,10,22,0.6);
  --glass-hi:rgba(16,16,32,0.78);
  --card:rgba(13,13,26,0.55);
  --card-h:rgba(18,18,34,0.72);
  --b:rgba(255,255,255,0.07);
  --bhi:rgba(255,255,255,0.13);
  --text:#e8e8f2;
  --sub:#9898b0;
  --muted:#5a5a72;
  --dim:#20203a;
  --accent:#c8fb4a;
  --adim:rgba(200,251,74,0.08);
  --aglow:rgba(200,251,74,0.15);
  --red:#ff5555;
  --rdim:rgba(255,85,85,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'DM Mono',monospace;}
body{background:var(--bg);color:var(--text);overflow-x:hidden;min-height:100vh;}
h1,h2,h3,.syne{font-family:'Syne',sans-serif;font-weight:700;}

/* ══ APP SHELL LAYOUT ══ */
#authScreen, #mainScreen { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
#authScreen { display: flex; }
.auth-box { background: var(--glass); border: 1px solid var(--b); padding: 40px; border-radius: 16px; backdrop-filter: blur(12px); width: 100%; max-width: 420px; }
.input-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
label { color: var(--sub); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; }
input, select, textarea { background: var(--dim); border: 1px solid var(--b); padding: 12px 16px; border-radius: 8px; color: var(--text); font-size: 1rem; width: 100%; outline: none; transition: all 0.2s; }
input:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 10px var(--adim); }

button { background: var(--accent); color: var(--bg); border: none; padding: 14px 24px; font-weight: 700; border-radius: 8px; cursor: pointer; transition: all 0.2s; font-family: 'Syne', sans-serif; }
button:hover { background: #d9ff70; transform: translateY(-1px); box-shadow: 0 4px 12px var(--aglow); }
button.secondary { background: transparent; color: var(--text); border: 1px solid var(--b); }
button.secondary:hover { background: var(--b); }
button.danger { background: var(--red); color: white; }
button.danger:hover { background: #ff7777; box-shadow: 0 4px 12px var(--rdim); }

.toggle-auth { text-align: center; margin-top: 20px; font-size: 0.9rem; color: var(--sub); cursor: pointer; text-decoration: underline; }
.nav { display: flex; width: 100%; max-width: 1000px; justify-content: space-between; align-items: center; margin-bottom: 30px; }
.container { display: flex; width: 100%; max-width: 1000px; gap: 30px; height: calc(100vh - 140px); }
.sidebar { width: 300px; display: flex; flex-direction: column; gap: 20px; }
.content-area { flex: 1; background: var(--glass); border: 1px solid var(--b); border-radius: 16px; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; }

.vault-list { display: flex; flex-direction: column; gap: 12px; }
.vault-item { background: var(--card); border: 1px solid var(--b); padding: 16px; border-radius: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
.vault-item:hover { background: var(--card-h); border-color: var(--accent); }

/* ══ MODALS & FLOATER SYSTEM ══ */
.modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(4,4,10,0.8); backdrop-filter:blur(8px); justify-content:center; align-items:center; z-index:1000; padding:20px; }
.modal-content { background:var(--bg); border:1px solid var(--b); border-radius:16px; padding:32px; width:100%; max-width:500px; display:flex; flex-direction:column; gap:20px; position:relative; }

#toast { position: fixed; bottom: 30px; right: 30px; background: var(--accent); color: var(--bg); padding: 12px 24px; border-radius: 8px; font-weight: bold; font-size: 0.95rem; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 2000; font-family: 'Syne', sans-serif; box-shadow: 0 4px 20px var(--aglow); }
</style>
</head>
<body>

<div id="authScreen">
  <div class="auth-box" id="loginBox">
    <h1 style="margin-bottom:24px; font-size:2rem;">VAULT_</h1>
    <div class="input-group">
      <label>Username</label>
      <input type="text" id="auth_user" autocomplete="username">
    </div>
    <div class="input-group">
      <label>Master Password</label>
      <input type="password" id="auth_pass" autocomplete="current-password">
    </div>
    <button id="btn_submit_auth" style="width:100%;">Unlock Vault</button>
    <div class="toggle-auth" id="btn_toggle_mode">Need a new secure vault? Create account</div>
  </div>
</div>

<div id="mainScreen">
  <div class="nav">
    <h2 style="font-size:1.5rem;">VAULT<span style="color:var(--accent);">.</span></h2>
    <div style="display:flex; gap:12px; align-items:center;">
      <span id="sync_status" style="font-size:0.8rem; color:var(--sub)">● Synced</span>
      <button class="secondary" id="btn_logout" style="padding:8px 16px;">Lock</button>
      <button class="danger" id="btn_open_del" style="padding:8px 16px;">Delete Vault</button>
    </div>
  </div>

  <div class="container">
    <div class="sidebar">
      <button id="btn_new_entry" style="width:100%;">+ Add Secure Entry</button>
      <div class="input-group" style="margin-top:10px;">
        <select id="ui_sort_filter">
          <option value="title_asc">Title (A-Z)</option>
          <option value="title_desc">Title (Z-A)</option>
        </select>
      </div>
    </div>
    <div class="content-area">
      <div class="vault-list" id="vault_list_container"></div>
    </div>
  </div>
</div>

<div class="modal" id="entryModal">
  <div class="modal-content">
    <h3 id="modal_title" style="font-size:1.3rem;">Secure Entry</h3>
    <input type="hidden" id="entry_id">
    <div class="input-group"><label>Title</label><input type="text" id="entry_name" placeholder="Service / App Name"></div>
    <div class="input-group"><label>Login ID / Username</label><input type="text" id="entry_login"></div>
    <div class="input-group"><label>Password</label><input type="password" id="entry_password"></div>
    <div class="input-group"><label>Resource Link / Notes</label><textarea id="entry_notes" rows="3"></textarea></div>
    <div style="display:flex; gap:12px; justify-content:flex-end; margin-top:10px;">
      <button class="secondary" id="btn_close_entry">Cancel</button>
      <button id="btn_save_entry">Encrypt & Save</button>
    </div>
  </div>
</div>

<div class="modal" id="delModal">
  <div class="modal-content">
    <h3 style="color:var(--red);">Danger Zone: Permanent Deletion</h3>
    <p style="font-size:0.9rem; color:var(--sub);">This action wipes your cryptographic record store document completely. Input your password and confirmation phrase to execute drop.</p>
    <div class="input-group"><label>Confirm Master Password</label><input type="password" id="del_confirm_pass"></div>
    <div class="input-group"><label>Type "DELETE"</label><input type="text" id="del_confirm_text" placeholder="DELETE"></div>
    <div style="display:flex; gap:12px; justify-content:flex-end;">
      <button class="secondary" id="btn_close_del">Cancel</button>
      <button class="danger" id="btn_execute_del">Purge Storage Profile</button>
    </div>
  </div>
</div>

<div id="toast">Notification Engine</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
  getFirestore, doc, getDoc, setDoc, deleteDoc, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ── RESTORED YOUR GENUINE FIREBASE PROJECT CREDENTIALS ──
const firebaseConfig = {
  apiKey: "AIzaSyAF1nxXeZhz7LvWpQFTnFYNifuZII_R-mE",
  authDomain: "onekey-5067d.firebaseapp.com",
  projectId: "onekey-5067d",
  storageBucket: "onekey-5067d.firebasestorage.app",
  messagingSenderId: "1098836590874",
  appId: "1:1098836590874:web:9c62490ce2670a4418aca3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Global Runtime Variables
let APP_MODE = 'LOGIN'; 
let U = null; // Plaintext Username matches your backend layout explicitly
let CIPHER_KEY = null;
let DEC_ENTRIES_CACHE = [];
let RAW_ENTRIES_BACKUP = []; // Stores encrypted representations for mutations
let unsub = null;

/* ══ UTILITY & ELEMENT SHORTCUTS ══ */
const $ = id => document.getElementById(id);
const showToast = (txt) => { const t=$('toast'); t.innerText=txt; t.style.opacity=1; setTimeout(()=>t.style.opacity=0, 3000); };
const setBusy = (id, isBusy, text) => { const b=$(id); b.disabled=isBusy; b.innerText=isBusy ? "Processing..." : text; };

/* ══ CRYPTOGRAPHIC HELPERS (WebCrypto API) ══ */
const toB64 = buf => btoa(String.fromCharCode(...new Uint8Array(buf)));
const fromB64 = str => Uint8Array.from(atob(str), c => c.charCodeAt(0));
const txtEnc = new TextEncoder();
const txtDec = new TextDecoder();

async function deriveKey(password, salt) {
  const base = await crypto.subtle.importKey("raw", txtEnc.encode(password), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: salt, iterations: 310000, hash: "SHA-256" },
    base,
    { name: "AES-GCM", length: 256 },
    false,
    ["encrypt", "decrypt"]
  );
}

async function enc(txt, key) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const encBuf = await crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, key, txtEnc.encode(txt));
  const out = new Uint8Array(12 + encBuf.byteLength);
  out.set(iv);
  out.set(new Uint8Array(encBuf), 12);
  return toB64(out);
}

async function dec(b64, key) {
  const buf = fromB64(b64);
  const decBuf = await crypto.subtle.decrypt({ name: "AES-GCM", iv: buf.slice(0, 12) }, key, buf.slice(12));
  return txtDec.decode(decBuf);
}

/* ══ AUTH MANAGEMENT FLOWS ══ */
async function handleAuth() {
  const u = $('auth_user').value.trim().toLowerCase();
  const p = $('auth_pass').value;
  if(!u || !p) return showToast("Missing fields");

  setBusy('btn_submit_auth', true, APP_MODE === 'LOGIN' ? 'Unlock Vault' : 'Create Account');
  
  try {
    const userDocRef = doc(db, 'vaults', u);
    const snap = await getDoc(userDocRef);

    if (APP_MODE === 'REGISTER') {
      if (snap.exists()) throw new Error("Username already taken");
      
      const salt = crypto.getRandomValues(new Uint8Array(16));
      CIPHER_KEY = await deriveKey(p, salt);
      const verifyToken = await enc("VAULT_OK", CIPHER_KEY);
      
      await setDoc(userDocRef, {
        salt: toB64(salt),
        verifyToken: verifyToken,
        entries: [],
        updatedAt: Date.now()
      });
      
      showToast("Secure Vault Generated 🔐");
    } else {
      if (!snap.exists()) throw new Error("No vault found for this username");
      const data = snap.data();
      
      CIPHER_KEY = await deriveKey(p, fromB64(data.salt));
      
      try {
        const verify = await dec(data.verifyToken, CIPHER_KEY);
        if (verify !== "VAULT_OK") throw 0;
      } catch(e) {
        throw new Error("Wrong password");
      }
      showToast("Vault Unlocked!");
    }

    U = u;
    $('authScreen').style.display = 'none';
    $('mainScreen').style.display = 'flex';
    
    // Bind Realtime snapshot channels matching original architecture layouts
    unsub = onSnapshot(userDocRef, async (snapshot) => {
      if (snapshot.exists()) {
        $('sync_status').innerText = "● Syncing...";
        RAW_ENTRIES_BACKUP = snapshot.data().entries || [];
        DEC_ENTRIES_CACHE = [];
        
        for (let e of RAW_ENTRIES_BACKUP) {
          try {
            const title = await dec(e.name, CIPHER_KEY);
            const login = await dec(e.user, CIPHER_KEY);
            const password = await dec(e.pass, CIPHER_KEY);
            const notes = await dec(e.notes, CIPHER_KEY);
            
            DEC_ENTRIES_CACHE.push({ id: e.id, title, login, password, notes });
          } catch(err) {
            console.error("Decryption single failure loop tracking node.", err);
          }
        }
        renderUI();
        $('sync_status').innerText = "● Synced";
      }
    }, (error) => {
      showToast("Sync break boundary detected: " + error.message);
      $('sync_status').innerText = "● Sync Error";
    });
    
  } catch(err) {
    showToast(err.message);
  } finally {
    setBusy('btn_submit_auth', false, APP_MODE === 'LOGIN' ? 'Unlock Vault' : 'Create Account');
  }
}

function renderUI() {
  const container = $('vault_list_container');
  container.innerHTML = "";
  
  const sortVal = $('ui_sort_filter').value;
  let sorted = [...DEC_ENTRIES_CACHE];
  
  if (sortVal === "title_asc") sorted.sort((a,b) => a.title.localeCompare(b.title));
  if (sortVal === "title_desc") sorted.sort((a,b) => b.title.localeCompare(a.title));

  if (sorted.length === 0) {
    container.innerHTML = `<p style="color:var(--muted); text-align:center; padding:40px 0;">No entries inside array.</p>`;
    return;
  }

  sorted.forEach(item => {
    const div = document.createElement('div');
    div.className = "vault-item";
    div.innerHTML = `
      <div>
        <h4 class="syne" style="color:var(--accent);">${item.title}</h4>
        <p style="font-size:0.85rem; color:var(--sub); margin-top:4px;">${item.login || 'No Username'}</p>
      </div>
      <button class="secondary edit-trigger" style="padding:6px 12px; font-size:0.8rem;">View / Edit</button>
    `;
    div.querySelector('.edit-trigger').addEventListener('click', () => openEntryModal(item.id));
    container.appendChild(div);
  });
}

async function saveEntry() {
  const id = $('entry_id').value;
  const title = $('entry_name').value.trim();
  const login = $('entry_login').value.trim();
  const password = $('entry_password').value;
  const notes = $('entry_notes').value;

  if(!title) return showToast("Title structural node label required");
  setBusy('btn_save_entry', true, 'Encrypt & Save');

  try {
    const targetId = id || crypto.randomUUID();
    
    // Parallel WebCrypto Array Buffer Pipeline executions
    const [eName, eUser, ePass, eNotes] = await Promise.all([
      enc(title, CIPHER_KEY), enc(login, CIPHER_KEY), enc(password, CIPHER_KEY), enc(notes, CIPHER_KEY)
    ]);

    const targetPayload = { id: targetId, name: eName, user: eUser, pass: ePass, notes: eNotes };
    
    // Filter and update or insert new items inside the original schema vector array
    let updatedEntries = RAW_ENTRIES_BACKUP.filter(item => item.id !== targetId);
    updatedEntries.push(targetPayload);

    await setDoc(doc(db, 'vaults', U), { entries: updatedEntries }, { merge: true });

    showToast("Atomic Entity Saved Securely");
    $('entryModal').style.display = 'none';
  } catch(e) {
    showToast("Encryption/Storage error loop: " + e.message);
  } finally {
    setBusy('btn_save_entry', false, 'Encrypt & Save');
  }
}

async function executeAccountPurge() {
  const p = $('del_confirm_pass').value;
  const conf = $('del_confirm_text').value.trim();
  if(!p) return showToast("Master key access confirm failed");
  if(conf !== 'DELETE') return showToast("Aborted: Text confirmation key incorrect");

  setBusy('btn_execute_del', true, 'Purge Storage Profile');

  try {
    const snap = await getDoc(doc(db, 'vaults', U));
    const data = snap.data();
    const checkKey = await deriveKey(p, fromB64(data.salt));
    const verify = await dec(data.verifyToken, checkKey);
    if(verify !== "VAULT_OK") throw new Error("Incorrect authentication context verification");

    if (unsub) { unsub(); unsub = null; }
    await deleteDoc(doc(db, 'vaults', U));

    showToast("Profile drop lifecycle execution completed.");
    window.location.reload();
  } catch(e) {
    showToast("Operation terminated: " + e.message);
  } finally {
    setBusy('btn_execute_del', false, 'Purge Storage Profile');
  }
}

/* ══ UI EVENT ROUTING MATRIX (REPLACING INLINE WINDOW EVENT HANDLERS) ══ */
$('btn_submit_auth').addEventListener('click', handleAuth);
$('btn_toggle_mode').addEventListener('click', () => {
  if (APP_MODE === 'LOGIN') {
    APP_MODE = 'REGISTER';
    $('btn_submit_auth').innerText = 'Create Account';
    $('btn_toggle_mode').innerText = 'Already have a secure vault? Unlock here';
  } else {
    APP_MODE = 'LOGIN';
    $('btn_submit_auth').innerText = 'Unlock Vault';
    $('btn_toggle_mode').innerText = 'Need a new secure vault? Create account';
  }
});

$('btn_logout').addEventListener('click', () => { window.location.reload(); });
$('ui_sort_filter').addEventListener('change', renderUI);

$('btn_new_entry').addEventListener('click', () => {
  $('modal_title').innerText = "Create Entry Nodes";
  $('entry_id').value = "";
  ['entry_name', 'entry_login', 'entry_password', 'entry_notes'].forEach(id => $(id).value = "");
  $('entryModal').style.display = 'flex';
});

function openEntryModal(id) {
  const record = DEC_ENTRIES_CACHE.find(e => e.id === id);
  if(!record) return;
  $('modal_title').innerText = "Edit Secure Target Elements";
  $('entry_id').value = record.id;
  $('entry_name').value = record.title;
  $('entry_login').value = record.login;
  $('entry_password').value = record.password;
  $('entry_notes').value = record.notes;
  $('entryModal').style.display = 'flex';
}

$('btn_close_entry').addEventListener('click', () => $('entryModal').style.display = 'none');
$('btn_save_entry').addEventListener('click', saveEntry);

$('btn_open_del').addEventListener('click', () => {
  $('del_confirm_pass').value = "";
  $('del_confirm_text').value = "";
  $('delModal').style.display = 'flex';
});
$('btn_close_del').addEventListener('click', () => $('delModal').style.display = 'none');
$('btn_execute_del').addEventListener('click', executeAccountPurge);
</script>
</body>
</html>
