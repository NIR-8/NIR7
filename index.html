<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Wardrobe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .img-container { aspect-ratio: 2/3; overflow: hidden; background: #eee; }
        .img-container img { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body class="bg-gray-100 p-4">

    <div class="max-w-md mx-auto mb-6 sticky top-0 bg-gray-100 py-4 z-10 flex gap-2">
        <label class="flex-1 bg-indigo-600 text-white text-center py-3 rounded-lg font-bold cursor-pointer hover:bg-indigo-700">
            Bulk Upload
            <input type="file" id="file-input" multiple accept="image/*" class="hidden">
        </label>
        <button onclick="pickOutfit()" class="flex-1 bg-black text-white py-3 rounded-lg font-bold">
            Suggest Pair
        </button>
        <button onclick="clearAll()" class="bg-red-200 text-red-700 px-4 rounded-lg">Clear</button>
    </div>

    <div id="grid" class="max-w-md mx-auto grid grid-cols-2 gap-2"></div>

    <div id="modal" class="fixed inset-0 bg-black/90 hidden flex-col items-center justify-center p-4 z-20" onclick="this.classList.add('hidden')">
        <div class="grid grid-cols-1 gap-4 max-w-xs w-full">
            <div class="img-container bg-white rounded shadow-xl"><img id="suggest-1" src=""></div>
            <div class="img-container bg-white rounded shadow-xl"><img id="suggest-2" src=""></div>
        </div>
        <p class="text-white mt-4 text-sm">Tap anywhere to close</p>
    </div>

    <script>
        let items = JSON.parse(localStorage.getItem('minWardrobe')) || [];

        // Handle File Uploads
        document.getElementById('file-input').addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    items.push(event.target.result); // Save Base64 string
                    saveAndRender();
                };
                reader.readAsDataURL(file);
            });
        });

        function saveAndRender() {
            localStorage.setItem('minWardrobe', JSON.stringify(items));
            const grid = document.getElementById('grid');
            grid.innerHTML = items.map((src, index) => `
                <div class="img-container relative bg-white rounded shadow-sm">
                    <img src="${src}">
                    <button onclick="remove(${index})" class="absolute top-1 right-1 bg-black/50 text-white w-6 h-6 rounded-full text-xs">×</button>
                </div>
            `).join('');
        }

        function remove(index) {
            items.splice(index, 1);
            saveAndRender();
        }

        function clearAll() {
            if(confirm("Delete all items?")) {
                items = [];
                saveAndRender();
            }
        }

        function pickOutfit() {
            if (items.length < 2) return alert("Upload at least 2 photos!");
            const i1 = Math.floor(Math.random() * items.length);
            let i2 = Math.floor(Math.random() * items.length);
            while(i1 === i2) i2 = Math.floor(Math.random() * items.length);

            document.getElementById('suggest-1').src = items[i1];
            document.getElementById('suggest-2').src = items[i2];
            document.getElementById('modal').classList.remove('hidden');
        }

        // Initial Load
        saveAndRender();
    </script>
</body>
</html>
